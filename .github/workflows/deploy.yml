name: Deploy to Production

on:
  push:
    branches: [main]
    paths:
      - 'supabase/**'
      - 'scripts/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry-run (1 = nichts wirklich tun)'
        required: false
        default: '0'

# Notes:
# - Cloudflare Pages baut den Frontend-Teil automatisch nach Push auf main.
#   Diese Action kümmert sich nur um Server-Stack (Supabase + Stripe).
# - Sequenziell, nicht parallel: Migrations vor Functions, Functions vor Cron.

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Supabase Stack
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      VAPID_PUBLIC_KEY: ${{ secrets.VAPID_PUBLIC_KEY }}
      VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
      VAPID_SUBJECT: ${{ secrets.VAPID_SUBJECT || 'mailto:info@greenscan.ch' }}
      STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
      STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
      GS_INTERACTIVE: '0'
      GS_DRY_RUN: ${{ github.event.inputs.dry_run || '0' }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Supabase CLI
        run: |
          curl -fsSL https://github.com/supabase/cli/releases/latest/download/supabase_linux_amd64.tar.gz \
            | tar xz -C /usr/local/bin
          supabase --version

      - name: Install jq + curl (already on ubuntu)
        run: which jq curl

      - name: Run master deploy
        run: bash scripts/deploy.sh

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: deploy-logs
          path: |
            /tmp/*.log
          retention-days: 7
