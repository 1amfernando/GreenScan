<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a3d1a"/>
      <stop offset="100%" stop-color="#2e7d32"/>
    </linearGradient>
    <linearGradient id="leaf" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7cc97c"/>
      <stop offset="100%" stop-color="#3d9e3d"/>
    </linearGradient>
    <linearGradient id="leaf2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a5e0a5"/>
      <stop offset="100%" stop-color="#5cba5c"/>
    </linearGradient>
  </defs>
  <!-- Full bleed background (safe-zone is inner 80% = circle radius ~205px from center) -->
  <rect width="512" height="512" fill="url(#bg)"/>
  <!-- All content within the inner 80% safe-zone (centered ~256, radius ~190) -->
  <g transform="translate(256 256) scale(0.62) translate(-256 -256)">
    <!-- Stem -->
    <path d="M 256 420 Q 256 360 250 300 Q 248 250 256 200 Q 262 170 256 140"
          stroke="#1a3d1a" stroke-width="14" stroke-linecap="round" fill="none" opacity="0.85"/>
    <!-- Big leaf left -->
    <path d="M 256 280
             Q 160 240 130 290
             Q 110 340 170 360
             Q 220 365 256 320 Z"
          fill="url(#leaf)" stroke="#1a3d1a" stroke-width="6"/>
    <!-- Big leaf right -->
    <path d="M 256 220
             Q 360 180 390 230
             Q 410 280 350 300
             Q 290 305 256 260 Z"
          fill="url(#leaf2)" stroke="#1a3d1a" stroke-width="6"/>
    <!-- Top leaf -->
    <path d="M 256 160
             Q 200 110 220 70
             Q 256 40 290 70
             Q 312 110 256 160 Z"
          fill="url(#leaf2)" stroke="#1a3d1a" stroke-width="6"/>
  </g>
</svg>
